<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>This Month — Printable Calendar Generator</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111111">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css?v=2026-05-short-default">
  <script defer src="app.js?v=2026-05-short-default"></script>
  <script defer src="today.js?v=2026-05-short-default"></script>
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <p class="eyebrow">Live month view</p>
      <h1 id="todayHeading">Today</h1>
      <p>This month at a glance, with today highlighted. <a href="index.html">Open the calendar generator &rarr;</a></p>
    </header>

    <section class="panel">
      <canvas id="todayCanvas" width="1123" height="794" aria-label="Current month calendar"></canvas>
    </section>
  </main>
  <script>
    if ("serviceWorker" in navigator) {
      addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
    }
  </script>
</body>
</html>
