# Builds a debug APK of the Android widget app on every push to main that
# touches android/, and on manual dispatch. The APK is uploaded as a workflow
# artifact you can download from the run page on a phone (Chrome → Install
# unknown app) — no PC needed in the loop.
#
# Unit tests for the recurrence parser and Ireland holidays run as a gate
# before the APK is built; a test failure fails the workflow.

name: Build Android debug APK

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android-debug.yml"
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android-debug.yml"
  workflow_dispatch:

# Cancel an older run for the same ref when a new push lands — no point
# building stale shas.
concurrency:
  group: android-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test + assembleDebug
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        # AGP 8.x + Kotlin 2.x both target Java 17. Temurin is what Android
        # Studio ships internally too.
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        # Installs cmdline-tools + the SDK packages declared in the build
        # files (compileSdk 35, build-tools 35.x). Caches across runs.
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties', 'android/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Surface APK info
        # Prints a quick "what did we just build" summary in the run log.
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          ls -lah "$APK"
          echo "SHA-256:"
          sha256sum "$APK"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: printcal-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload unit-test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: android/app/build/reports/tests/
          if-no-files-found: ignore
          retention-days: 14
